<script>
    var KCtoken;
    var userData = {};

    var secURL = "";
    var baseURL = "";
    var appURL = "";  

    const necessaryGroups = ["/SPEL/MAN-vyroba"];
    const necessaryRoles = []//["3BX0000101"];//
    const haveAllItems = (arr, values) => values.every(v => arr.includes(v));


 

var tooltipTriggerList; 
var tooltipList; 






    //********************************************* debug tables *********************************************

    function setToken(data){
        KCtoken=data;
        //tady xhttprequest na roli v abre a teprve potom yes/no access
        //pozor, preset musime spustit i tady, obcas je sso rychlejsi nez DOMContent
        //a diky tomu nejsou nastavene URL-cili vysledkem volani auth je 404 :D
        preset();

        if ('groups' in KCtoken){
            if (haveAllItems(KCtoken.groups, necessaryGroups)===true) {
                //tady xhttprequest na roli v abre a teprve potom yes/no access
                let senddata = {"preferred_username":KCtoken.preferred_username};
                makeRequest("POST", secURL + "authabra.php", JSON.stringify(senddata), responseAUTH,"",15000, "Ověřuji přístup");
            } else {
                noAccess();
            }
            //debug - shorting - yes je callback z xhttp roli
            //yesAccess();
        } else {
            
        }
        
    }

    function responseAUTH(response) {
        var abraAUTH = false;
        //console.log(JSON.parse(response));
        udata = JSON.parse(response);
        if (udata["status"]["result"]== "OK") {
            //processing - zjistime jeste roles ["data"][0]["userinfo"])
            if ("ID" in udata["data"][0]["userinfo"]) {
                if (udata["data"][0]["userinfo"]["locked"]===false && haveAllItems(udata["data"][0]["roleinfo"], necessaryRoles)) {
                    userData = udata["data"][0];
                    abraAUTH = true;
                }
            }

        } else {
            //zadny data - noAccess
        }

        // pro DEMO kontrolu premostime
        //abraAUTH = true;

        if (abraAUTH === true){
            yesAccess();
        } else {
            noAccess();
        }
        
    }



    function yesAccess() {
        // udelime divu "main" display, vyrenderujeme jmeno prihlaseneho
        document.getElementById("main").style.display="block";
        document.getElementById("loggedin").innerHTML = KCtoken.given_name + '&nbsp;' + KCtoken.family_name;
        document.getElementById("connectinfo").innerHTML = userData["conninfo"]["INFO"] + "&nbsp;/&nbsp;" + userData["conninfo"]["OCI"] + "&nbsp;/&nbsp;" + userData["conninfo"]["API"] ;

        refreshToolTips();
       
        

    }

    function noAccess(){
        //nemame token - vysvitime div s hlaskou a pryc
        document.getElementById("main").style.display="none";
        document.getElementById("nocredentials").style.display="block";
    }




//---------------------------------- spinner a spol ----------------------------------
    function runspin(spintext="..stahuji data.."){
        document.getElementById("sping").style.display = "block";
        document.getElementById("spint").textContent = spintext;
    }

    function stopspin(){
        //alert("stopspin");
        document.getElementById("sping").style.display = "none";
    }  
    
    function refreshToolTips() {
            if (tooltipList && tooltipList.length) {
            tooltipList.forEach(tooltip => tooltip.dispose());
            }        
            tooltipList=[];
            tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));   
            tooltipList.forEach(function(tooltip){
            tooltip.hide();
            });            
            
    }


//---------------------------------- spinner a spol ----------------------------------


    // ************************** blok zakladnich funkci **************************
    function nofunc(){
    //prazdna funkce pro cbk pri resetAll
    }

    function preset() {
        //nastaveni params...
        //newhydra - zatim appstest
        if (window.location.hostname != 'newhydra.spel.cz'){
            secURL = "https://" + window.location.hostname + "/apps/security/phpscripts/";
            appURL = "https://" + window.location.hostname + "/apps/waspinew/phpscripts/";
            baseURL = "https://" + window.location.hostname + "/apps/nopdacommons/phpscripts/";
        } else {
            secURL = "https://newhydra.spel.cz/deleni/apps/security/phpscripts/";
            appURL ="https://newhydra.spel.cz/deleni/apps/waspinew/phpscripts/";
            baseURL = "https://newhydra.spel.cz/deleni/apps/nopdacommons/phpscripts/";
        }

    }


</script>
